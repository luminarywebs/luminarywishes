<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8a2be2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00ffff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background circle (optional, for rounded icons) -->
  <circle cx="256" cy="256" r="240" fill="#0a0e27" />
  
  <!-- Outer Glow -->
  <path d="M256 80 L290 220 L430 256 L290 292 L256 432 L222 292 L82 256 L222 222 Z" fill="url(#grad1)" filter="url(#glow)" opacity="0.6">
    <animateTransform attributeName="transform" type="rotate" from="0 256 256" to="360 256 256" dur="20s" repeatCount="indefinite" />
  </path>
  
  <!-- Main Sparkle -->
  <path d="M256 120 L280 230 L390 256 L280 282 L256 392 L232 282 L122 256 L232 230 Z" fill="white" filter="url(#glow)" />
  
  <!-- Inner Sparkle -->
  <path d="M256 180 L270 240 L330 256 L270 272 L256 332 L242 272 L182 256 L242 240 Z" fill="url(#grad1)" />
  
  <!-- Small Star Accents -->
  <circle cx="100" cy="100" r="10" fill="white">
     <animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite" />
  </circle>
  <circle cx="412" cy="150" r="8" fill="white">
     <animate attributeName="opacity" values="1;0;1" dur="2s" repeatCount="indefinite" />
  </circle>
  <circle cx="150" cy="400" r="12" fill="white">
     <animate attributeName="opacity" values="0;1;0" dur="4s" repeatCount="indefinite" />
  </circle>
</svg>
